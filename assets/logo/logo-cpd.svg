<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 52" fill="none">
  <!-- CPD Logo — modernised from original Creative Process mark -->
  <!-- Angular shape — cleaned-up version of the original tilted quadrilateral -->
  <polygon points="8,52 0,8 140,0 148,44" fill="#1565C0" rx="2"/>
  <!-- Vertical accent line -->
  <line x1="98" y1="6" x2="98" y2="46" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <!-- Wordmark: creative process -->
  <text x="18" y="26" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-weight="600" font-size="15" fill="white" letter-spacing="0.5">creative</text>
  <text x="18" y="43" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-weight="600" font-size="15" fill="white" letter-spacing="0.5">process</text>
  <!-- Digital wordmark -->
  <text x="160" y="30" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-weight="700" font-size="14" fill="#0D1B2A" letter-spacing="3">DIGITAL</text>
</svg>