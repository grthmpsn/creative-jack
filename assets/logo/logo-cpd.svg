<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" fill="none">
  <!-- CPD Logo: The Blocks — interlocking rounded squares + wordmark -->
  <!-- Three overlapping rounded squares stepping upward -->
  <rect x="1" y="20" width="20" height="20" rx="5" fill="#1565C0" opacity="0.3"/>
  <rect x="11" y="12" width="20" height="20" rx="5" fill="#1565C0" opacity="0.6"/>
  <rect x="21" y="4" width="20" height="20" rx="5" fill="#0D1B2A"/>
  <!-- Amber accent block -->
  <rect x="15" y="34" width="11" height="11" rx="3" fill="#F59E0B"/>
  <!-- Wordmark -->
  <text x="54" y="22" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-weight="800" font-size="16" fill="#0D1B2A">Creative Process</text>
  <text x="54" y="40" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-weight="700" font-size="13" fill="#1565C0" letter-spacing="2">Digital</text>
</svg>