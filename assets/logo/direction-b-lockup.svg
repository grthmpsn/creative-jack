<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" fill="none">
  <!-- Direction B: Icon + Wordmark Lockup -->
  <!-- Icon: Abstract "CP" monogram formed from overlapping geometric shapes -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800');
  </style>

  <!-- Icon: Stylised upward arrow / growth mark made from 3 bars -->
  <rect x="4" y="40" width="12" height="32" rx="3" fill="#1565C0"/>
  <rect x="20" y="24" width="12" height="48" rx="3" fill="#1565C0"/>
  <rect x="36" y="8" width="12" height="64" rx="3" fill="#0D1B2A"/>
  <!-- Amber accent dot — represents the "spark" of creative process -->
  <circle cx="42" cy="4" r="4" fill="#F59E0B"/>

  <!-- Wordmark -->
  <text x="64" y="38" font-family="'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="26" fill="#0D1B2A" letter-spacing="-0.3">Creative Process</text>
  <text x="64" y="60" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="18" fill="#1565C0" letter-spacing="3.5">DIGITAL</text>
</svg>